<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Vault — Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/dashboard.css">

</head>

<body>

  <nav>
    <div class="nav-brand">
      Family Vault
    </div>
    <div class="nav-right">
      <span class="nav-user">// <strong id="navUsername">—</strong></span>
      <a href="/upload" class="btn-nav upload" id="adminLink" style="display:none">+ Upload</a>
      <button class="btn-nav theme" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <button class="btn-nav" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div>
        <h2>FAMILY <span>DOCS</span></h2>
        <p>// ALL FILES ENCRYPTED · AES-256</p>
      </div>
      <span class="doc-count" id="docCount">LOADING…</span>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" onclick="filterDocs('All', this)">All</button>
      <button class="filter-chip" onclick="filterDocs('Property', this)">Property</button>
      <button class="filter-chip" onclick="filterDocs('Insurance', this)">Insurance</button>
      <button class="filter-chip" onclick="filterDocs('Passport', this)">Passport</button>
      <button class="filter-chip" onclick="filterDocs('Identity', this)">Identity</button>
      <button class="filter-chip" onclick="filterDocs('Medical', this)">Medical</button>
      <button class="filter-chip" onclick="filterDocs('Financial', this)">Financial</button>
      <button class="filter-chip" onclick="filterDocs('Legal', this)">Legal</button>
      <button class="filter-chip" onclick="filterDocs('Vehicle', this)">Vehicle</button>
    </div>

    <div class="doc-grid" id="docGrid">
      <div class="loading-state">
        <div class="spinner-block"></div>
        <p>LOADING DOCUMENTS…</p>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- DELETE CONFIRMATION MODAL -->
  <div class="modal-overlay" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-header-icon">🗑️</span>
        <span class="modal-header-title" id="modalTitle">Delete Document</span>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong id="modalDocTitle">this document</strong>?</p>
        <small>// THIS ACTION CANNOT BE UNDONE.</small>
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modalCancelBtn" onclick="closeDeleteModal()">No</button>
        <button class="modal-btn confirm-delete" id="modalConfirmBtn" onclick="confirmDelete()">Yes</button>
      </div>
    </div>
  </div>
  <script src="js/dashboard.js"></script>
</body>

</html>
