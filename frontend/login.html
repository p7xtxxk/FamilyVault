<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Vault — Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./login.css">
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️ LIGHT</button>

  <div class="card">
    <div class="card-header">
      <div class="card-header-text">
        <h1>Family Vault</h1>
        <p>Secure Document Access</p>
      </div>
    </div>

    <div class="card-body">
      <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
        <div class="step-dot" id="dot3"></div>
      </div>

      <div id="msgBox" class="msg"></div>

      <div id="step1" class="step active">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
        </div>
        <button class="btn" id="sendOtpBtn" onclick="sendOTP()">Send Code →</button>
      </div>

      <div id="step2" class="step">
        <div class="field">
          <label>6-Digit Code</label>
          <input type="text" id="otpInput" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric"
            autocomplete="one-time-code">
        </div>
        <button class="btn" id="verifyBtn" onclick="verifyOTP()">Verify & Enter →</button>
        <button class="btn-secondary" onclick="goBack()">← Different Email</button>
        <p class="otp-hint">// CODE EXPIRES IN 5 MINUTES. CHECK SPAM.</p>
      </div>

      <div id="step3" class="step">
        <div class="field">
          <label>Your Display Name</label>
          <input type="text" id="usernameInput" placeholder="e.g. Priya, Dad, Grandma…" maxlength="40"
            autocomplete="nickname">
        </div>
        <button class="btn" onclick="setUsername()">Join Vault →</button>
      </div>
    </div>
  </div>

  <script src="./login.js"></script>
</body>

</html>
