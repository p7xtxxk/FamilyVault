<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Vault — Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFE500;
    --red: #FF2D2D;
    --blue: #1a1aff;
    --green: #00CC66;
    --bg: #f5f0e8;
    --surface: #ffffff;
    --nav-bg: #0a0a0a;
    --text: #0a0a0a;
    --text-inv: #f5f0e8;
    --muted: #666;
    --grid-color: rgba(10,10,10,0.05);
    --border: 3px solid #0a0a0a;
    --shadow: 6px 6px 0px #0a0a0a;
    --shadow-lg: 10px 10px 0px #0a0a0a;
    --shadow-sm: 4px 4px 0px #0a0a0a;
  }

  [data-theme="dark"] {
    --bg: #111111;
    --surface: #1c1c1c;
    --nav-bg: #000000;
    --text: #f5f0e8;
    --text-inv: #0a0a0a;
    --muted: #999;
    --grid-color: rgba(245,240,232,0.04);
    --border: 3px solid #f5f0e8;
    --shadow: 6px 6px 0px #f5f0e8;
    --shadow-lg: 10px 10px 0px #f5f0e8;
    --shadow-sm: 4px 4px 0px #f5f0e8;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg); min-height: 100vh;
    color: var(--text); transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 48px 48px; z-index: 0; pointer-events: none;
  }

  nav {
    background: var(--nav-bg);
    border-bottom: 3px solid var(--text);
    padding: 0 40px; height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    transition: background 0.3s;
  }

  [data-theme="dark"] nav { border-bottom-color: #f5f0e8; }

  .nav-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 50px; color: var(--yellow);
    letter-spacing: 0.06em; display: flex; align-items: center; gap: 12px;
  }
  .nav-brand-icon {
    width: 40px; height: 40px; background: var(--yellow);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }

  .nav-right { display: flex; gap: 12px; align-items: center; }

  .btn-nav {
    padding: 9px 18px; border: 2px solid rgba(245,240,232,0.3);
    background: transparent; color: #f5f0e8;
    font-family: 'Space Mono', monospace; font-size: 13px;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; text-decoration: none; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-nav:hover { background: rgba(245,240,232,0.1); border-color: #f5f0e8; }

  main {
    max-width: 700px; margin: 0 auto;
    padding: 52px 32px; position: relative; z-index: 1;
  }

  .page-header { margin-bottom: 36px; }

  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 68px); color: var(--text);
    letter-spacing: 0.03em; line-height: 1;
  }
  h2 span {
    display: inline-block; background: var(--red);
    color: #ffffff; padding: 0 12px;
    border: 3px solid var(--text); margin-left: 6px;
  }
  .page-header p {
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: var(--muted); letter-spacing: 0.06em; margin-top: 10px;
  }

  /* ADMIN NOTICE */
  .admin-notice {
    border: var(--border); background: var(--yellow);
    padding: 14px 20px; margin-bottom: 26px;
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: #0a0a0a;
  }

  /* DOC LIMIT BAR */
  .doc-limit {
    border: var(--border); background: #0a0a0a; color: var(--yellow);
    padding: 14px 20px; margin-bottom: 30px;
    font-family: 'Space Mono', monospace; font-size: 14px;
    font-weight: 700; letter-spacing: 0.06em;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow-sm);
  }
  [data-theme="dark"] .doc-limit { background: #000; border-color: #f5f0e8; }

  .limit-bar-track {
    width: 140px; height: 10px;
    background: rgba(245,240,232,0.15);
    border: 2px solid rgba(245,240,232,0.3);
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .limit-bar-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: var(--yellow); transition: width 0.5s ease;
  }

  /* MESSAGE */
  .msg {
    padding: 14px 20px; border: var(--border);
    font-family: 'Space Mono', monospace; font-size: 14px;
    font-weight: 700; margin-bottom: 24px; display: none; letter-spacing: 0.04em;
  }
  .msg.error  { background: var(--red); color: #fff; display: block; box-shadow: var(--shadow-sm); }
  .msg.success { background: var(--green); color: #0a0a0a; display: block; box-shadow: var(--shadow-sm); }

  /* CARD */
  .card { background: var(--surface); border: var(--border); box-shadow: var(--shadow-lg); transition: background 0.3s; }

  .card-header-strip {
    background: #0a0a0a; padding: 18px 28px;
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    color: var(--yellow); letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 10px;
  }
  [data-theme="dark"] .card-header-strip { background: #000; border-bottom: 2px solid #f5f0e8; }

  .card-body { padding: 32px 28px; }

  .field { margin-bottom: 26px; }

  label {
    display: block; font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }

  input, select {
    width: 100%; padding: 16px 18px; border: var(--border);
    background: var(--bg); font-family: 'Space Grotesk', sans-serif;
    font-size: 17px; font-weight: 500; color: var(--text);
    outline: none; transition: box-shadow 0.15s, background 0.3s;
    appearance: none;
  }
  input:focus, select:focus { box-shadow: var(--shadow); background: var(--surface); }
  input::placeholder { color: #aaa; font-weight: 400; }

  .select-wrapper { position: relative; }
  .select-wrapper::after {
    content: '▼'; position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%); font-size: 11px;
    pointer-events: none; color: var(--text);
  }

  /* DROP ZONE */
  .drop-zone {
    border: var(--border); border-style: dashed;
    padding: 56px 20px; text-align: center;
    cursor: pointer; transition: all 0.15s;
    background: var(--bg); position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    background: var(--yellow); border-style: solid;
    box-shadow: var(--shadow);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .drop-icon { font-size: 48px; display: block; margin-bottom: 14px; }
  .drop-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px; font-weight: 700; color: var(--text);
  }
  .drop-hint {
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: var(--muted); margin-top: 8px; letter-spacing: 0.06em;
  }

  .file-preview {
    display: none; border: var(--border);
    background: #0a0a0a; color: var(--yellow);
    padding: 14px 18px; margin-top: 12px;
    font-family: 'Space Mono', monospace; font-size: 13px;
    align-items: center; gap: 12px; font-weight: 700;
  }
  [data-theme="dark"] .file-preview { border-color: #f5f0e8; }
  .file-preview.show { display: flex; }
  .file-size { margin-left: auto; opacity: 0.65; font-size: 13px; }

  /* UPLOAD BTN */
  .btn-upload {
    width: 100%; padding: 22px;
    background: #0a0a0a; color: var(--yellow);
    border: var(--border);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.15s;
    box-shadow: var(--shadow); margin-top: 8px;
  }
  [data-theme="dark"] .btn-upload { background: var(--yellow); color: #0a0a0a; border-color: #f5f0e8; }
  .btn-upload:hover { box-shadow: var(--shadow-lg); transform: translate(-3px,-3px); }
  .btn-upload:active { box-shadow: 2px 2px 0 var(--text); transform: translate(4px,4px); }
  .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: var(--shadow); }

  /* PROGRESS */
  .progress-wrap {
    border: var(--border); height: 18px; margin-top: 16px;
    display: none; background: var(--bg); overflow: hidden;
  }
  .progress-wrap.show { display: block; }
  .progress-fill {
    height: 100%;
    background: repeating-linear-gradient(
      45deg, var(--yellow) 0px, var(--yellow) 10px,
      #0a0a0a 10px, #0a0a0a 20px
    );
    width: 0; transition: width 0.4s ease;
  }
  [data-theme="dark"] .progress-fill {
    background: repeating-linear-gradient(
      45deg, var(--yellow) 0px, var(--yellow) 10px,
      #333 10px, #333 20px
    );
  }

  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 3px solid rgba(255,229,0,0.3);
    border-top-color: var(--yellow); border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  [data-theme="dark"] .btn-upload .spinner { border-color: rgba(0,0,0,0.2); border-top-color: #0a0a0a; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 0 16px; height: 64px; }
    .nav-brand { font-size: 22px; }
    .nav-brand-icon { width: 32px; height: 32px; font-size: 16px; }
    .btn-nav { padding: 7px 12px; font-size: 11px; }
    main { padding: 28px 16px; }
    .card-body { padding: 22px 18px; }
    .drop-zone { padding: 40px 16px; }
    .drop-icon { font-size: 36px; }
    .drop-text { font-size: 16px; }
    .drop-hint { font-size: 12px; }
    .btn-upload { font-size: 22px; padding: 18px; }
    .limit-bar-track { width: 90px; }
    label { font-size: 12px; }
    input, select { font-size: 16px; }
    .msg { font-size: 13px; }
    .doc-limit { font-size: 12px; flex-wrap: wrap; gap: 10px; }
    .admin-notice { font-size: 12px; }
  }

  @media (max-width: 400px) {
    .card-header-strip { font-size: 18px; padding: 14px 18px; }
    input, select { font-size: 15px; padding: 14px 14px; }
    .btn-upload { font-size: 20px; padding: 16px; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <div class="nav-brand-icon">🔐</div>
    Family Vault
  </div>
  <div class="nav-right">
    <a href="/dashboard" class="btn-nav">← Dashboard</a>
    <button class="btn-nav" onclick="toggleTheme()" id="themeBtn">☀️</button>
    <button class="btn-nav" onclick="logout()">Sign Out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h2>UPLOAD <span>DOC</span></h2>
    <p>// FILES ARE AES-256 ENCRYPTED BEFORE STORAGE</p>
  </div>

  <div class="admin-notice" id="adminNotice" style="display:none">
    🔐 UPLOADING AS: <strong id="adminEmail">—</strong>
  </div>

  <div class="doc-limit" id="docLimitBar">
    <span id="limitText">LOADING…</span>
    <div class="limit-bar-track">
      <div class="limit-bar-fill" id="limitFill" style="width:0%"></div>
    </div>
  </div>

  <div id="msgBox" class="msg"></div>

  <div class="card">
    <div class="card-header-strip">📄 DOCUMENT DETAILS</div>
    <div class="card-body">
      <div class="field">
        <label>Document Title</label>
        <input type="text" id="titleInput" placeholder="e.g. Home Insurance Policy 2024" maxlength="100">
      </div>

      <div class="field">
        <label>Document Type</label>
        <div class="select-wrapper">
          <select id="typeInput">
            <option value="">— Select type —</option>
            <option>Property</option>
            <option>Insurance</option>
            <option>Passport</option>
            <option>Identity</option>
            <option>Medical</option>
            <option>Financial</option>
            <option>Legal</option>
            <option>Vehicle</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>PDF File</label>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept=".pdf" onchange="fileSelected(this)">
          <span class="drop-icon">📄</span>
          <div class="drop-text">CLICK TO CHOOSE or DRAG & DROP</div>
          <div class="drop-hint">// PDF ONLY · MAX 20 MB</div>
        </div>
        <div class="file-preview" id="filePreview">
          <span>📄</span>
          <span id="fileName">—</span>
          <span class="file-size" id="fileSize">—</span>
        </div>
      </div>

      <button class="btn-upload" id="uploadBtn" onclick="uploadDocument()">
        ENCRYPT & UPLOAD
      </button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</main>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('vaultTheme', isDark ? 'light' : 'dark');
}

(function(){
  const saved = localStorage.getItem('vaultTheme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
  });
})();

function showMsg(text, type='error') {
  const box = document.getElementById('msgBox');
  box.textContent = '> ' + text; box.className = 'msg ' + type;
}

function fileSelected(input) {
  const f = input.files[0]; if (!f) return;
  if (!f.name.toLowerCase().endsWith('.pdf')) { showMsg('Only PDF files are accepted.'); input.value = ''; return; }
  if (f.size > 20 * 1024 * 1024) { showMsg('File too large. Maximum 20 MB.'); input.value = ''; return; }
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileSize').textContent = (f.size/1024/1024).toFixed(2) + ' MB';
  document.getElementById('filePreview').classList.add('show');
}

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); });

async function uploadDocument() {
  const title = document.getElementById('titleInput').value.trim();
  const type = document.getElementById('typeInput').value;
  const file = document.getElementById('fileInput').files[0];
  if (!title) return showMsg('Document title required.');
  if (!type) return showMsg('Document type required.');
  if (!file) return showMsg('PDF file required.');

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>ENCRYPTING & UPLOADING…';

  const pw = document.getElementById('progressWrap');
  const pf = document.getElementById('progressFill');
  pw.classList.add('show'); pf.style.width = '30%';

  const formData = new FormData();
  formData.append('title', title);
  formData.append('document_type', type);
  formData.append('file', file);

  try {
    pf.style.width = '65%';
    const r = await fetch('/api/upload-document', {method:'POST', body: formData});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Upload failed');
    pf.style.width = '100%';
    showMsg('Upload complete: ' + d.message, 'success');
    document.getElementById('titleInput').value = '';
    document.getElementById('typeInput').value = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('filePreview').classList.remove('show');
    loadDocCount();
  } catch(e) { showMsg(e.message); pf.style.width = '0'; }
  finally {
    btn.disabled = false; btn.innerHTML = 'ENCRYPT & UPLOAD';
    setTimeout(() => pw.classList.remove('show'), 2200);
  }
}

async function loadDocCount() {
  try {
    const r = await fetch('/api/documents'); if (!r.ok) return;
    const d = await r.json();
    const pct = Math.min((d.count / d.limit) * 100, 100);
    document.getElementById('limitText').textContent = `${d.count} / ${d.limit} DOCS USED`;
    document.getElementById('limitFill').style.width = pct + '%';
    if (d.count >= d.limit) {
      document.getElementById('limitText').textContent += ' — LIMIT REACHED';
      document.getElementById('uploadBtn').disabled = true;
    }
  } catch {}
}

async function checkAdmin() {
  try {
    const r = await fetch('/api/auth/me'); if (!r.ok) { window.location.href = '/'; return; }
    const u = await r.json();
    if (!u.is_admin) {
      document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;font-family:'Space Mono',monospace">
        <div style="border:3px solid #f5f0e8;background:#FF2D2D;color:white;padding:52px 48px;text-align:center;box-shadow:10px 10px 0 #f5f0e8;max-width:440px;width:90%">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:0.1em">ACCESS DENIED</div>
          <p style="font-size:12px;margin:14px 0 24px;letter-spacing:0.08em;opacity:0.85">// ADMIN ONLY PAGE</p>
          <a href="/dashboard" style="background:#f5f0e8;color:#0a0a0a;padding:13px 28px;text-decoration:none;font-size:13px;font-weight:700;letter-spacing:0.08em;display:inline-block;border:2px solid #f5f0e8">← BACK TO VAULT</a>
        </div>
      </div>`;
      return;
    }
    const notice = document.getElementById('adminNotice');
    document.getElementById('adminEmail').textContent = u.email;
    notice.style.display = '';
  } catch { window.location.href = '/'; }
}

async function logout() {
  await fetch('/api/auth/logout', {method:'POST'});
  window.location.href = '/';
}

checkAdmin(); loadDocCount();
</script>
</body>
</html>
