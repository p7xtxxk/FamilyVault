<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Vault — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f0e8;
    --yellow: #FFE500;
    --red: #FF2D2D;
    --blue: #1a1aff;
    --green: #00CC66;
    --border: 3px solid var(--black);
    --shadow: 5px 5px 0px var(--black);
    --shadow-sm: 3px 3px 0px var(--black);
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--white);
    min-height: 100vh;
    color: var(--black);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--black) 1px, transparent 1px),
      linear-gradient(90deg, var(--black) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.04;
    z-index: 0;
    pointer-events: none;
  }

  /* NAV */
  nav {
    background: var(--black);
    border-bottom: var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .nav-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--yellow);
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-brand-icon {
    width: 34px; height: 34px;
    background: var(--yellow);
    border: 2px solid var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-user {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(245,240,232,0.5);
    letter-spacing: 0.06em;
  }
  .nav-user strong { color: var(--yellow); font-weight: 700; }

  .btn-nav {
    padding: 7px 16px;
    border: 2px solid rgba(245,240,232,0.3);
    background: transparent;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn-nav:hover { background: rgba(245,240,232,0.1); border-color: var(--white); }

  .btn-nav.upload {
    background: var(--yellow);
    color: var(--black);
    border-color: var(--yellow);
    box-shadow: 3px 3px 0 rgba(245,240,232,0.3);
  }
  .btn-nav.upload:hover {
    box-shadow: 5px 5px 0 rgba(245,240,232,0.3);
    transform: translate(-1px,-1px);
  }

  /* MAIN */
  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* PAGE HEADER */
  .page-header {
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .page-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--black);
    letter-spacing: 0.03em;
    line-height: 1;
  }

  .page-header h2 span {
    display: inline-block;
    background: var(--yellow);
    padding: 0 8px;
    border: 2px solid var(--black);
  }

  .page-header p {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #666;
    letter-spacing: 0.06em;
    margin-top: 8px;
  }

  .doc-count {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--black);
    background: var(--yellow);
    border: var(--border);
    padding: 8px 16px;
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 700;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 6px 14px;
    border: 2px solid var(--black);
    background: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-chip:hover { background: var(--black); color: var(--white); }
  .filter-chip.active { background: var(--black); color: var(--yellow); box-shadow: var(--shadow-sm); }

  /* DOC GRID */
  .doc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .doc-card {
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow);
    padding: 0;
    transition: box-shadow 0.15s, transform 0.15s;
    animation: cardIn 0.4s cubic-bezier(0.34, 1.3, 0.64, 1) both;
    position: relative;
    overflow: hidden;
  }

  .doc-card:hover {
    box-shadow: 8px 8px 0 var(--black);
    transform: translate(-3px, -3px);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.92) rotate(-1deg); }
    to   { opacity: 1; transform: scale(1) rotate(0); }
  }

  .doc-card-top {
    background: var(--black);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .doc-type-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--yellow);
    background: transparent;
  }

  .doc-icon {
    font-size: 20px;
    line-height: 1;
  }

  .doc-card-body {
    padding: 18px;
  }

  .doc-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--black);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .doc-date {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
  }

  .doc-actions {
    display: flex;
    gap: 8px;
    border-top: 2px solid var(--black);
    padding-top: 14px;
  }

  .btn-doc {
    flex: 1;
    padding: 9px 6px;
    border: 2px solid var(--black);
    background: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.1s;
    text-align: center;
    text-decoration: none;
    color: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .btn-doc:hover { background: var(--black); color: var(--white); }

  .btn-doc.primary {
    background: var(--black);
    color: var(--yellow);
    box-shadow: var(--shadow-sm);
  }
  .btn-doc.primary:hover { background: #333; box-shadow: 4px 4px 0 var(--black); transform: translate(-1px,-1px); }

  .btn-doc.danger {
    background: var(--red);
    color: var(--white);
    border-color: var(--black);
    display: none;
  }
  .doc-card:hover .btn-doc.danger { display: flex; }
  .btn-doc.danger:hover { background: #cc0000; }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1;
    border: var(--border);
    box-shadow: var(--shadow-lg);
    padding: 80px 40px;
    text-align: center;
    background: var(--white);
  }

  .empty-icon { font-size: 52px; margin-bottom: 16px; display: block; }

  .empty-state h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  .empty-state p {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #888;
  }

  /* LOADING */
  .loading-state {
    grid-column: 1/-1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px;
    gap: 16px;
  }

  .spinner-block {
    width: 40px; height: 40px;
    border: 4px solid var(--black);
    border-top-color: var(--yellow);
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state p {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #888;
    letter-spacing: 0.08em;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    padding: 14px 20px;
    border: var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    z-index: 100;
    transform: translateY(100px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 0.04em;
  }
  .toast.show { transform: translateY(0); }
  .toast.success { background: var(--yellow); color: var(--black); box-shadow: var(--shadow); }
  .toast.error { background: var(--red); color: var(--white); box-shadow: var(--shadow); }

  /* COLOR CODING BY DOC TYPE */
  .doc-card[data-type="Property"] .doc-card-top { background: #1a1aff; }
  .doc-card[data-type="Insurance"] .doc-card-top { background: #006633; }
  .doc-card[data-type="Passport"] .doc-card-top { background: #6600cc; }
  .doc-card[data-type="Identity"] .doc-card-top { background: #cc6600; }
  .doc-card[data-type="Medical"] .doc-card-top { background: #cc0033; }
  .doc-card[data-type="Financial"] .doc-card-top { background: #006666; }
  .doc-card[data-type="Legal"] .doc-card-top { background: #333333; }
  .doc-card[data-type="Vehicle"] .doc-card-top { background: #553300; }

  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    main { padding: 24px 16px; }
    .page-header { flex-direction: column; align-items: flex-start; }
    .page-header h2 { font-size: 38px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-brand-icon">🔐</div>
    Family Vault
  </div>
  <div class="nav-right">
    <span class="nav-user">// <strong id="navUsername">—</strong></span>
    <a href="/upload" class="btn-nav upload" id="adminLink" style="display:none">+ Upload Doc</a>
    <button class="btn-nav" onclick="logout()">Sign Out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <h2>FAMILY <span>DOCS</span></h2>
      <p>// ALL FILES ENCRYPTED · AES-256</p>
    </div>
    <span class="doc-count" id="docCount">LOADING…</span>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" onclick="filterDocs('All', this)">All</button>
    <button class="filter-chip" onclick="filterDocs('Property', this)">🏠 Property</button>
    <button class="filter-chip" onclick="filterDocs('Insurance', this)">🛡️ Insurance</button>
    <button class="filter-chip" onclick="filterDocs('Passport', this)">🛂 Passport</button>
    <button class="filter-chip" onclick="filterDocs('Identity', this)">🪪 Identity</button>
    <button class="filter-chip" onclick="filterDocs('Medical', this)">⚕️ Medical</button>
    <button class="filter-chip" onclick="filterDocs('Financial', this)">💼 Financial</button>
    <button class="filter-chip" onclick="filterDocs('Legal', this)">⚖️ Legal</button>
    <button class="filter-chip" onclick="filterDocs('Vehicle', this)">🚗 Vehicle</button>
  </div>

  <div class="doc-grid" id="docGrid">
    <div class="loading-state">
      <div class="spinner-block"></div>
      <p>LOADING DOCUMENTS…</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const DOC_TYPE_ICONS = {
  'Property':'🏠','Insurance':'🛡️','Passport':'🛂',
  'Identity':'🪪','Medical':'⚕️','Financial':'💼',
  'Legal':'⚖️','Vehicle':'🚗','Other':'📄',
};

let isAdmin = false;
let allDocuments = [];
let activeFilter = 'All';

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = '> ' + msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
}

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filterDocs(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderDocuments(allDocuments);
}

function renderDocuments(docs) {
  const grid = document.getElementById('docGrid');
  const filtered = activeFilter === 'All' ? docs : docs.filter(d => d.document_type === activeFilter);

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">📂</span>
        <h3>No Documents Found</h3>
        <p>// ${activeFilter === 'All' ? 'No documents have been uploaded yet.' : 'No ' + activeFilter + ' documents found.'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((doc, i) => {
    const icon = DOC_TYPE_ICONS[doc.document_type] || '📄';
    const deleteBtn = isAdmin
      ? `<button class="btn-doc danger" onclick="deleteDoc('${doc.id}', this)">🗑️ DEL</button>`
      : '';
    return `
      <div class="doc-card" data-type="${escapeHtml(doc.document_type)}" style="animation-delay:${i*0.06}s">
        <div class="doc-card-top">
          <span class="doc-type-badge">${escapeHtml(doc.document_type || 'Document')}</span>
          <span class="doc-icon">${icon}</span>
        </div>
        <div class="doc-card-body">
          <div class="doc-title">${escapeHtml(doc.title)}</div>
          <div class="doc-date">// ADDED ${formatDate(doc.uploaded_at)}</div>
          <div class="doc-actions">
            <a class="btn-doc primary" href="/api/get_document/${doc.id}" target="_blank">📖 VIEW</a>
            <a class="btn-doc" href="/api/get_document/${doc.id}" download>⬇ SAVE</a>
            ${deleteBtn}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function loadUser() {
  try {
    const r = await fetch('/api/auth/me');
    if (!r.ok) { window.location.href = '/'; return; }
    const u = await r.json();
    document.getElementById('navUsername').textContent = u.username || u.email;
    isAdmin = u.is_admin;
    if (isAdmin) document.getElementById('adminLink').style.display = '';
  } catch { window.location.href = '/'; }
}

async function loadDocuments() {
  try {
    const r = await fetch('/api/documents');
    if (!r.ok) { window.location.href = '/'; return; }
    const data = await r.json();
    document.getElementById('docCount').textContent = `${data.count} / ${data.limit} DOCS`;
    allDocuments = data.documents || [];
    renderDocuments(allDocuments);
  } catch {
    document.getElementById('docGrid').innerHTML =
      `<div class="empty-state"><span class="empty-icon">⚠️</span><h3>Load Failed</h3><p>// Please refresh the page.</p></div>`;
  }
}

async function deleteDoc(id, btn) {
  if (!confirm('Permanently delete this document?')) return;
  btn.disabled = true;
  try {
    const r = await fetch(`/api/documents/${id}`, {method:'DELETE'});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail);
    showToast('Document deleted.');
    loadDocuments();
  } catch(e) {
    showToast(e.message, 'error');
    btn.disabled = false;
  }
}

async function logout() {
  await fetch('/api/auth/logout', {method:'POST'});
  window.location.href = '/';
}

loadUser().then(loadDocuments);
</script>
</body>
</html>
